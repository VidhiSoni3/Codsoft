<!DOCTYPE html>
<html>
<head>
    <title>FoodExpress</title>
    <link rel="stylesheet" href="food.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
    <h1>FoodExpress</h1>
</header>

<!-- Hero Section -->
<section class="hero">
    <div class="overlay">
        <h2>Delicious Food, Delivered Fast</h2>
        <p>Fresh meals at your doorstep in minutes.</p>
        <button>Order Now</button>
    </div>
</section>

<!-- Products Section -->
<section class="products">
    <h2>Featured Dishes</h2>

    <div class="container">

        <div class="card">
            <img src="pizza.jpg">
            <h3>Pizza</h3>
            <p>Loaded with cheese & toppings</p>
        </div>

        <div class="card">
            <img src="burger.jpg">
            <h3>Burger</h3>
            <p>Juicy and crispy delight</p>
        </div>

        <div class="card">
            <img src="pasta.jpg">
            <h3>Pasta</h3>
            <p>Authentic Italian taste</p>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 FoodExpress | All Rights Reserved</p>
</footer>

</body>
</html>
